name: CI and production deployment

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: datastorified-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: Production quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint source
        run: pnpm lint

      - name: Typecheck applications
        run: pnpm typecheck

      - name: Run unit and component tests
        run: pnpm test

      - name: Enforce coverage thresholds
        run: pnpm test:coverage

      - name: Build applications
        run: pnpm build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Run browser regression suite
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy-website:
    name: Deploy website
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.VERCEL_DEPLOY_ENABLED == 'true'
    uses: ./.github/workflows/vercel-deploy.yml
    with:
      project_name: website
      vercel_org_id: ${{ vars.VERCEL_ORG_ID }}
      vercel_project_id: ${{ vars.VERCEL_WEBSITE_PROJECT_ID }}
    secrets: inherit

  deploy-calculators:
    name: Deploy calculators
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.VERCEL_DEPLOY_ENABLED == 'true'
    uses: ./.github/workflows/vercel-deploy.yml
    with:
      project_name: calculators
      vercel_org_id: ${{ vars.VERCEL_ORG_ID }}
      vercel_project_id: ${{ vars.VERCEL_CALCULATORS_PROJECT_ID }}
    secrets: inherit

  deploy-tools:
    name: Deploy tools
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.VERCEL_DEPLOY_ENABLED == 'true'
    uses: ./.github/workflows/vercel-deploy.yml
    with:
      project_name: tools
      vercel_org_id: ${{ vars.VERCEL_ORG_ID }}
      vercel_project_id: ${{ vars.VERCEL_TOOLS_PROJECT_ID }}
    secrets: inherit
